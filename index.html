<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Terrafront Mobile</title>
<style>
    body { margin:0; overflow:hidden; background:#000; }
    canvas { display:block; }
    #ui {
        position:absolute;
        top:20px;
        left:20px;
        color:#ffffffcc;
        font-family:Arial;
        font-size:14px;
        letter-spacing:1px;
    }
</style>
</head>
<body>

<div id="ui">
Terrafront • Survival Prototype<br>
Swipe to look • Tap with 2 fingers to move
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene = new THREE.Scene();

// 🌅 Атмосферне небо
scene.fog = new THREE.Fog(0x87a8c4, 20, 120);
scene.background = new THREE.Color(0x87a8c4);

let camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

let renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// ☀ Сонце
let sun = new THREE.DirectionalLight(0xfff2cc, 1.2);
sun.position.set(50,100,30);
sun.castShadow = true;
scene.add(sun);

// 🌤 М’яке освітлення
scene.add(new THREE.AmbientLight(0xffffff, 0.35));

// 🌍 Terrain
let size = 300;
let segments = 200;

let geometry = new THREE.PlaneGeometry(size, size, segments, segments);
geometry.rotateX(-Math.PI/2);

for (let i = 0; i < geometry.attributes.position.count; i++) {
    let x = geometry.attributes.position.getX(i);
    let z = geometry.attributes.position.getZ(i);

    let height =
        Math.sin(x * 0.05) * 2 +
        Math.cos(z * 0.05) * 2 +
        Math.random() * 0.5;

    geometry.attributes.position.setY(i, height);
}

geometry.computeVertexNormals();

let material = new THREE.MeshStandardMaterial({
    color: 0x3b7d3b,
    roughness: 1,
    metalness: 0
});

let terrain = new THREE.Mesh(geometry, material);
terrain.receiveShadow = true;
scene.add(terrain);

// 🎥 Камера
camera.position.set(0, 8, 20);

let velocity = {x:0, z:0};
let speed = 0.4;
let moving = false;

// Рух двома пальцями
window.addEventListener("touchstart", (e)=>{
    if(e.touches.length === 2){
        moving = true;
    }
});

window.addEventListener("touchend", ()=>{
    moving = false;
});

// Поворот одним пальцем
let lastX = 0;
let rotating = false;

window.addEventListener("touchstart", (e)=>{
    if(e.touches.length === 1){
        rotating = true;
        lastX = e.touches[0].clientX;
    }
});

window.addEventListener("touchmove", (e)=>{
    if(rotating && e.touches.length === 1){
        let delta = e.touches[0].clientX - lastX;
        camera.rotation.y -= delta * 0.005;
        lastX = e.touches[0].clientX;
    }
});

window.addEventListener("touchend", ()=>{
    rotating = false;
});

// Анімація
function animate(){
    requestAnimationFrame(animate);

    if(moving){
        camera.position.x -= Math.sin(camera.rotation.y) * speed;
        camera.position.z -= Math.cos(camera.rotation.y) * speed;
    }

    renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
